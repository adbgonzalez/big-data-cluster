spark.master yarn
spark.submit.deployMode client

spark.eventLog.enabled true
spark.eventLog.dir hdfs://namenode:9000/spark-logs
spark.history.fs.logDirectory hdfs://namenode:9000/spark-logs
spark.history.fs.update.interval 10s
spark.yarn.populateHadoopClasspath true

spark.jars /opt/spark/jars-extra/hadoop-aws-3.4.3.jar,/opt/spark/jars-extra/bundle-2.35.4.jar,/opt/spark/jars-extra/iceberg-spark-runtime-4.0_2.13-1.10.1.jar
spark.driver.extraClassPath /opt/spark/jars-extra/*
spark.executor.extraClassPath /opt/spark/jars-extra/*

spark.hadoop.fs.s3a.endpoint http://minio:9000
spark.hadoop.fs.s3a.access.key minioadmin
spark.hadoop.fs.s3a.secret.key minioadmin
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.connection.ssl.enabled false
spark.hadoop.fs.s3a.impl org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.maximum 128
spark.hadoop.fs.s3a.attempts.maximum 10

# Delta + Iceberg para DAGs de Airflow sobre HDFS
spark.sql.extensions io.delta.sql.DeltaSparkSessionExtension,org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.spark_catalog org.apache.spark.sql.delta.catalog.DeltaCatalog

# Catalogo Iceberg "local" sobre HDFS
spark.sql.catalog.local org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type hadoop
spark.sql.catalog.local.warehouse hdfs://namenode:9000/user/airflow/warehouse/iceberg
