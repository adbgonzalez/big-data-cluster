# ------------------------------------------------------------------
# Master
# ------------------------------------------------------------------
spark.master yarn
spark.submit.deployMode client

# ------------------------------------------------------------------
# Recursos (xeral): máis capacidade por defecto en YARN
# - dynamic allocation: adapta nº executores segundo carga
# - executores máis grandes que 1g (evita crashes)
# ------------------------------------------------------------------

# activamos asignación dinámica (xeral)
spark.dynamicAllocation.enabled           true
spark.dynamicAllocation.shuffleTracking.enabled true

# rango de executores (axusta segundo RAM dispoñible)
spark.dynamicAllocation.minExecutors      1
spark.dynamicAllocation.initialExecutors  1
spark.dynamicAllocation.maxExecutors      4

# tamaño dos executores (máis “capacidade” por defecto)
spark.executor.cores                      1
spark.executor.memory                     3g
spark.executor.memoryOverhead             1024m

# driver (notebook)
spark.driver.memory                       2g
spark.driver.maxResultSize                2g

# paralelismo (equilibrado)
spark.sql.shuffle.partitions              64
spark.default.parallelism                 64

# estabilidade
spark.task.maxFailures                    8
spark.speculation                         false

# ------------------------------------------------------------------
# JARs locais (Hadoop AWS + Iceberg runtime)
# ------------------------------------------------------------------
spark.jars /opt/spark/jars-extra/hadoop-aws-3.4.3.jar,/opt/spark/jars-extra/bundle-2.35.4.jar,/opt/spark/jars-extra/iceberg-spark-runtime-4.0_2.13-1.10.1.jar

# ------------------------------------------------------------------
# Delta Lake e kafka vía Maven (bundle completo: inclúe delta-storage)
# ------------------------------------------------------------------
spark.jars.packages io.delta:delta-spark_2.13:4.0.1,org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.2

# ------------------------------------------------------------------
# Event logs para o History (en HDFS)
# ------------------------------------------------------------------
spark.eventLog.enabled true
spark.eventLog.dir hdfs://namenode:9000/spark-logs
spark.history.fs.logDirectory hdfs://namenode:9000/spark-logs
spark.history.fs.update.interval 10s

# ------------------------------------------------------------------
# S3A / MinIO
# ------------------------------------------------------------------
spark.hadoop.fs.s3a.path.style.access              true
spark.hadoop.fs.s3a.connection.ssl.enabled         false
spark.hadoop.fs.s3a.impl                           org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider       org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# axustes útiles en xeral
spark.hadoop.fs.s3a.connection.maximum             128
spark.hadoop.fs.s3a.attempts.maximum               10

# ------------------------------------------------------------------
# Extensións de Delta e Iceberg
# ------------------------------------------------------------------
spark.sql.extensions io.delta.sql.DeltaSparkSessionExtension,org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Delta no catálogo por defecto (spark_catalog)
spark.sql.catalog.spark_catalog org.apache.spark.sql.delta.catalog.DeltaCatalog

# ------------------------------------------------------------------
# Catálogo "local" sobre HDFS (modo Hadoop catalog, Iceberg)
# ------------------------------------------------------------------
spark.sql.catalog.local org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type hadoop
spark.sql.catalog.local.warehouse hdfs://namenode:9000/warehouse/iceberg

# ------------------------------------------------------------------
# Catálogo "minio" sobre S3A (MinIO, Iceberg)
# ------------------------------------------------------------------
spark.sql.catalog.minio org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.minio.type hadoop
spark.sql.catalog.minio.warehouse s3a://spark/iceberg-warehouse
