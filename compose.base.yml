name: bda

x-spark-common: &spark_common
  image: adbgonzalez/spark:4.1.1-py312
  networks: [cluster]

x-spark-env: &spark_env
  MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
  MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
  MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://minio:9000}"

x-spark-user: &spark_user
  user: "1000:1000"

services:
  namenode:
    <<: *spark_common
    container_name: namenode
    hostname: namenode
    environment: *spark_env
    ports:
      - "${NN_UI_HOST_PORT:-9870}:9870"
      - "${NN_RPC_HOST_PORT:-9000}:9000"
    volumes:
      - namenode_data_test:/home/hadoop/namenode
      - ./start-dfs.sh:/start-dfs.sh
    command: /bin/bash /start-dfs.sh

  datanode:
    <<: *spark_common
    container_name: datanode
    hostname: datanode
    environment: *spark_env
    volumes:
      - datanode_data_test:/home/hadoop/datanode/
    command: hdfs datanode

  resourcemanager:
    <<: *spark_common
    container_name: resourcemanager
    hostname: resourcemanager
    environment: *spark_env
    ports:
      - "${YARN_UI_HOST_PORT:-8088}:8088"
    command: yarn resourcemanager

  nodemanager:
    <<: *spark_common
    container_name: nodemanager
    hostname: nodemanager
    environment: *spark_env
    ports:
      - "${NM_UI_HOST_PORT:-8042}:8042"
    command: yarn nodemanager

  spark-history:
    <<: [*spark_common, *spark_user]
    container_name: spark-history
    hostname: spark-history
    depends_on: [namenode, resourcemanager]
    ports:
      - "${SPARK_HISTORY_HOST_PORT:-18080}:18080"
    environment:
      <<: *spark_env
      HADOOP_CONF_DIR: /usr/local/hadoop/etc/hadoop
      SPARK_ROLE: "history"
      SPARK_LOG_DIR: /opt/spark/logs
      SPARK_HISTORY_UI_PORT: "18080"
      SPARK_CONF_DIR: /opt/spark/conf
      SPARK_EXTRA_CLASSPATH: /opt/spark/jars-extra/*
    volumes:
      - ./spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./start-history.sh:/start-history.sh:ro
    command: ["bash","-lc","/start-history.sh"]

  notebook:
    image: adbgonzalez/spark-notebook:4.1.1-py312
    container_name: spark-notebook
    hostname: spark-notebook
    <<: [*spark_user]
    depends_on: [resourcemanager, datanode]
    networks: [cluster]
    ports:
      - "${JUPYTER_HOST_PORT:-8888}:8888"
    environment:
      <<: *spark_env
      HADOOP_CONF_DIR: /usr/local/hadoop/etc/hadoop
      PYSPARK_PYTHON: python3
      SPARK_CONF_DIR: /opt/spark/conf
      SPARK_EXTRA_CLASSPATH: /opt/spark/jars-extra/*
      SHELL: /bin/bash
    volumes:
      - ../spark-notebooks:/home/hadoop/work
      - ./spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    command: >
      bash -lc "jupyter lab --ip=0.0.0.0 --port=8888
      --NotebookApp.token='' --NotebookApp.password='' --no-browser"

networks:
  cluster:
    driver: bridge

volumes:
  namenode_data_test:
  datanode_data_test:
